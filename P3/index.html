<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasión Alienígena</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Invasión Alienígena</h1>

    <div id="hud">
        <div id="score">Puntos: 0</div>
        <div id="lives">Vidas: 3</div>
        <div id="energy">
            Energía:
            <div id="energy-bar">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div id="message"></div>

    <!-- Sonidos -->
    <audio id="laserSound" src="disparo.mp3"></audio>
    <audio id="explosionSound" src="muerte_alien.mp3"></audio>
    <audio id="winSound" src="victoria.mp3"></audio>
    <audio id="gameOverSound" src="derrota.mp3"></audio>

    <!-- Scripts -->
    <script src="script.js"></script>

</body>
</html>
