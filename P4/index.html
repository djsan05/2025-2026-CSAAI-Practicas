<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat the Word</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Beat the Word</h1>
</header>

<main>
    <section class="panel">
        <div class="controls">
            <button id="startBtn">▶ Comenzar</button>
            <button id="stopBtn">⏹ Detener</button>

            <label>
                Música:
                <input type="checkbox" id="musicToggle" checked>
            </label>

            <label>
                Pareja:
                <select id="pairSelect">
                    <option value="cama,casa">Cama / Casa</option>
                    <option value="gato,pato">Gato / Pato</option>
                    <option value="sol,sal">Sol / Sal</option>
                </select>
            </label>

            <label>
                Nivel inicial:
                <select id="levelSelect">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </label>
        </div>

        <div class="info">
            <p>Nivel: <span id="levelDisplay">1</span></p>
            <p>Tiempo: <span id="timeDisplay">0</span>s</p>
            <p>Estado: <span id="statusDisplay">Esperando...</span></p>
        </div>

        <div id="mainWord">Pulsa comenzar</div>
    </section>

    <section class="grid" id="grid"></section>
</main>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>



</body>
</html>
